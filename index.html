<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="description" content="A minimal, fast, local Markdown editor.">
  <title>markd — Markdown editor</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" class="app">
    <header class="titlebar">
      <button id="graphName" class="graph-name" type="button" title="Graph pages" hidden></button>
      <div class="document-title">
        <input id="fileName" value="Untitled" aria-label="Document name" spellcheck="false">
        <span id="dirtyDot" class="dirty-dot" aria-label="Unsaved changes"></span>
      </div>
      <button class="command-button" id="commandButton" aria-label="Open commands" aria-keyshortcuts="Control+K Meta+K" title="Commands (⌘/Ctrl + K)">
        <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg>
      </button>
    </header>

    <main class="workspace">
      <div class="findbar" id="findbar" hidden>
        <svg viewBox="0 0 24 24"><circle cx="10" cy="10" r="6"/><path d="m15 15 5 5"/></svg>
        <input id="findInput" type="search" placeholder="Find in document" aria-label="Find">
        <button id="findPrev" aria-label="Previous">↑</button><button id="findNext" aria-label="Next">↓</button>
        <button id="findClose" aria-label="Close">×</button>
      </div>

      <div class="markd-wrap" id="markdWrap">
        <article id="editor" class="editor" contenteditable="true" spellcheck="true" aria-label="Editor Markdown"></article>
        <article id="outliner" class="outliner" aria-label="Graph outliner" hidden>
          <nav id="zoomBreadcrumb" class="zoom-breadcrumb" aria-label="Block breadcrumb" hidden></nav>
          <div id="pagePreamble" class="page-preamble" hidden></div>
          <div id="blockTree" class="block-tree"></div>
          <button id="addBlock" class="add-block" type="button">Add block</button>
          <section id="references" class="references"></section>
        </article>
        <textarea id="sourceEditor" class="source-editor" spellcheck="false" aria-label="Markdown source" hidden></textarea>
      </div>

      <footer class="statusbar"><span id="vimStatus" class="vim-status" hidden>-- NORMAL --</span><span id="saveState">Ready</span><span id="wordCount">0 words</span></footer>
    </main>


    <div class="dialog-backdrop" id="confirmDialog" hidden>
      <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
        <h2 id="dialogTitle">Unsaved changes</h2>
        <p>Do you want to save this document before continuing?</p>
        <div><button data-dialog="cancel">Cancel</button><button data-dialog="discard">Don’t save</button><button class="primary" data-dialog="save">Save</button></div>
      </div>
    </div>

    <div class="command-backdrop" id="commandPalette" hidden>
      <div class="command-palette" role="dialog" aria-modal="true" aria-label="Commands">
        <div id="commandQuickActions" class="command-quick-actions" aria-label="File actions">
          <button data-quick-command="new" aria-label="New document" title="New document (⌘/Ctrl + N)">
            <svg viewBox="0 0 24 24"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9zM14 3v6h6M12 12v6M9 15h6"/></svg>
          </button>
          <button data-quick-command="open" aria-label="Open file" title="Open file (⌘/Ctrl + O)">
            <svg viewBox="0 0 24 24"><path d="M3 7h6l2 2h10l-2 10H5z"/></svg>
          </button>
          <button data-quick-command="save" aria-label="Save" title="Save (⌘/Ctrl + S)">
            <svg viewBox="0 0 24 24"><path d="M5 3h12l2 2v16H5zM8 3v6h8V3M8 21v-7h8v7"/></svg>
          </button>
          <button data-quick-command="export" aria-label="Export HTML" title="Export HTML (⌘/Ctrl + Shift + E)">
            <svg viewBox="0 0 24 24"><path d="M12 3v12M8 7l4-4 4 4M5 13v7h14v-7"/></svg>
          </button>
        </div>
        <div class="command-search">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="10" cy="10" r="6"/><path d="m15 15 5 5"/></svg>
          <input id="commandInput" type="text" placeholder="Type a command…" autocomplete="off" spellcheck="false" aria-label="Search commands">
        </div>
        <div id="commandList" class="command-list" role="listbox"></div>
      </div>
    </div>
    <div id="graphAutocomplete" class="graph-autocomplete" role="listbox" hidden></div>
    <div id="toast" class="toast" role="status"></div>
    <input id="fileInput" type="file" accept=".md,.markdown,.txt,text/markdown,text/plain" hidden>
  </div>
  <noscript>This application requires JavaScript.</noscript>
  <script src="graph.js"></script>
  <script src="app.js"></script>
</body>
</html>
