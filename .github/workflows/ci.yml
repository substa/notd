name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Python tests
        run: |
          python -m unittest discover -s tests -p 'test_*.py'
          python -m py_compile server.py
      - name: JavaScript tests
        run: node --test tests/*.test.js
      - name: Build default container
        run: docker build --file docker/Dockerfile --target runtime -t notd:test .
      - name: Build Git-enabled container
        run: docker build --file docker/Dockerfile --target runtime-git -t notd:test-git .
